services:
  postgres-test:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: solid_fortnight_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d solid_fortnight_test"]
      interval: 5s
      timeout: 5s
      retries: 5
