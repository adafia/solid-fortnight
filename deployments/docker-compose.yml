services:
  postgres:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: solid_fortnight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d solid_fortnight"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  management:
    build:
      context: ..
      dockerfile: apps/management/Dockerfile
    restart: always
    ports:
      - "8083:8083"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-solid_fortnight}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  evaluator:
    build:
      context: ..
      dockerfile: apps/evaluator/Dockerfile
    restart: always
    ports:
      - "8082:8082"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-solid_fortnight}
    depends_on:
      postgres:
        condition: service_healthy

  streamer:
    build:
      context: ..
      dockerfile: apps/streamer/Dockerfile
    restart: always
    ports:
      - "8084:8084"
    environment:
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy

  analytics:
    build:
      context: ..
      dockerfile: apps/analytics/Dockerfile
    restart: always
    ports:
      - "8081:8081"
    environment:
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy

  gateway:
    build:
      context: ..
      dockerfile: apps/gateway/Dockerfile
    restart: always
    # Removing public port mapping to ensure all traffic goes through Caddy (Dashboard)
    # for consistent single-origin (no CORS) testing.
    # ports:
    #   - "8080:8080"
    environment:
      MANAGEMENT_HOST: management
      EVALUATOR_HOST: evaluator
      STREAMER_HOST: streamer
      ANALYTICS_HOST: analytics
    depends_on:
      - management
      - evaluator
      - streamer
      - analytics

  dashboard:
    build:
      context: ../cmd/dashboard
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - gateway

volumes:
  postgres_data:
