services:
  postgres:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: solid_fortnight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d solid_fortnight"]
      interval: 5s
      timeout: 5s
      retries: 5

  management:
    build:
      context: ..
      dockerfile: apps/management/Dockerfile
    restart: always
    ports:
      - "8083:8083"
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DB_NAME: ${DB_NAME:-solid_fortnight}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
